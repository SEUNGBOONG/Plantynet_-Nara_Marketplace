name: G2B Bot Schedule
on:
  schedule:
    # 월~금요일, UTC 00:00 ~ 09:00 사이에 3시간 간격으로 실행 (한국시간 09:00, 12:00, 15:00, 18:00)
    - cron: '0 0-9/3 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼용

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run python g2b_bot.py
        run: python g2b_bot.py
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}