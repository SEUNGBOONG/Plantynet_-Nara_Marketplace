on:
  schedule:
    # 한국 시간(KST) 월~금요일 09:00, 12:00, 15:00, 18:00 정각에만 실행
    # (UTC 기준 00시, 03시, 06시, 09시)
    - cron: '0 0,3,6,9 * * 1-5'
  workflow_dispatch: # 필요할 때 언제든 수동으로 실행할 수 있는 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run python g2b_bot.py
        run: python g2b_bot.py
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}